# cargo-deny configuration for Gitway (M20.4)
#
# Enforces:
# - Licenses are GPL-3.0-compatible (the project ships under
#   GPL-3.0-or-later; runtime deps must be permissive enough to
#   bundle).
# - No security advisories (RUSTSEC-*) on any reachable crate.
# - Reasonable bounds on duplicate-version count (the russh +
#   ssh-key crypto stacks unavoidably introduce some duplicates).
# - Source allowlist: crates.io only.
#
# Run locally:
#     cargo deny check
#
# Run individual sections:
#     cargo deny check licenses
#     cargo deny check advisories
#     cargo deny check bans
#     cargo deny check sources

[graph]
# Targets we ship to.  Restricting the dependency graph to these
# targets gates out platform-specific crates that pull in
# incompatible licenses on platforms we never build.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]
all-features = false

[output]
feature-depth = 1

# ── Licenses ─────────────────────────────────────────────────────────────────

[licenses]
version = 2
# GPL-3.0-or-later allows linking against permissive licenses but
# not against more restrictive ones.  The list below is the union
# of every license that appears in the dependency tree as of v1.0;
# additions trigger a discussion before merge.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # MPL-2.0 (Mozilla Public License 2.0) is a weak per-file
    # copyleft that is GPL-3.0-compatible (FSF confirmed).
    # Source: https://www.mozilla.org/en-US/MPL/2.0/FAQ/#mpl-and-gpl
    # Used by `option-ext` (transitive via `dirs`) and `webpki-roots`.
    "MPL-2.0",
    # Project itself.
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8

# ── Bans / duplicate version policy ──────────────────────────────────────────

[bans]
# `warn` rather than `deny` for duplicates because the russh +
# ssh-key crypto stacks unavoidably bring in older transitive
# versions of `digest`, `block-buffer`, `crypto-common`, etc.
# Enforcing zero duplicates would require pinning the entire
# tree.
multiple-versions = "warn"
wildcards = "deny"
# Highlight crates that are known to be slow / deprecated /
# unmaintained when they appear in the tree.
deny = [
    # Permanently unmaintained; we don't depend on it but flag if
    # something pulls it in transitively.
    { name = "openssl", reason = "we use aws-lc-rs for crypto" },
    # Avoid serde_yaml (unmaintained as of 2024); use serde-yaml-ng
    # if YAML becomes necessary.
    { name = "serde_yaml", reason = "unmaintained upstream" },
]
# Allow specific duplicates explicitly when reviewing the warn
# output is more noise than signal.
skip = []
# Skip the entire dependency tree of these crates from the
# duplicate scan (proc-macros frequently bring older versions).
skip-tree = []

# ── Advisories ───────────────────────────────────────────────────────────────

[advisories]
version = 2
# Database refresh: `cargo deny fetch` updates the local copy.
# CI runs `cargo deny check advisories` which will fetch
# automatically.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Yanked crates: warn but do not fail.  A yanked transitive
# pulls our build to a halt before it gets to the advisory
# check anyway.
yanked = "warn"
# Ignored advisories — every entry MUST carry an explanation
# justifying why the issue does not apply to Gitway's threat
# model.  Reviewed at every release.
ignore = [
    # ── RUSTSEC-2023-0071 — Marvin Attack on the `rsa` crate ─────────
    # Affected: `rsa` 0.9.x and 0.10.0-rc.x (we transitively pull both
    # via `ssh-key` -> `rsa = "0.9"` and via russh's
    # `internal-russh-forked-ssh-key` -> `rsa = "0.10.0-rc.12"`).
    #
    # Status: NO PATCH AVAILABLE.  RustCrypto/RSA upstream is
    # working on a fully constant-time implementation; we'll bump
    # as soon as a fixed release lands.  See
    # https://github.com/RustCrypto/RSA/issues/626.
    #
    # Why we accept the risk for v1.0:
    #
    # 1. **Use site is keygen + SSHSIG signing — local operations.**
    #    Gitway's transport crypto runs through `russh` with the
    #    `aws-lc-rs` backend, which is constant-time.  The `rsa`
    #    crate's timing leak only matters for RSA private-key
    #    operations the user performs on their own machine via
    #    `gitway keygen` and `gitway sign`.
    #
    # 2. **SSH auth uses RSA private-key signatures rarely.**
    #    The default key for v1.0 personas is Ed25519 (which
    #    is not affected by this advisory).  RSA-SHA2 signatures
    #    are issued at most once per session — far below the
    #    sample count typically required for a Marvin-style
    #    timing-side-channel recovery.
    #
    # 3. **Network jitter dominates at SSH timescales.**  The
    #    Marvin Attack's discriminator (sub-microsecond timing
    #    differences in the modular operations) is well below
    #    the noise floor of SSH connection RTT (1–100 ms).
    #
    # 4. **No safe upgrade exists.**  Pinning to an older `rsa`
    #    version does not help — every published version is
    #    vulnerable.
    #
    # We will revisit this ignore when RustCrypto/RSA ships a
    # fixed release; see CHANGELOG and `docs/security.md` for the
    # operator-facing description of the residual risk.
    { id = "RUSTSEC-2023-0071", reason = "rsa crate Marvin Attack — no patch available; only used for local keygen + SSHSIG signing; SSH auth uses Ed25519 by default; network jitter dominates at SSH timescales. See deny.toml comments and docs/security.md." },
]

# ── Sources ──────────────────────────────────────────────────────────────────

[sources]
# crates.io only — git dependencies are reviewed case-by-case
# and listed in `allow-git`.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
